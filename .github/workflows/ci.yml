name: zero-cost-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f public/index.html
          test -f public/styles.css
          test -f public/app.js
          test -f src/orchestration/autonomy-loop.mjs

      - name: Run autonomy report
        run: node src/orchestration/autonomy-loop.mjs

      - name: Run company control plane
        run: node src/orchestration/run-company.mjs

      - name: Cost guardrail
        run: |
          ! grep -R "sk-[A-Za-z0-9]\{20,\}\|aws_secret_access_key\|stripe_secret\|paypal_client_secret" -i public src docs
